<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a0a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Fruit Merge" />
  <meta name="description" content="A juicy offline fruit merge puzzle game" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>🍉 Fruit Merge</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;800&display=swap');

    :root {
      --bg: #0d0820;
      --panel: #1a1035;
      --wall: #2a1f55;
      --accent: #ff6b9d;
      --accent2: #ffd93d;
      --accent3: #6bcb77;
      --text: #f0e6ff;
      --shadow: rgba(255,107,157,0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: 'Nunito', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 10%, rgba(108,60,200,0.25) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 80% 80%, rgba(255,107,157,0.15) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 12px 4px;
      height: 100dvh;
    }

    /* Header */
    header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    h1 {
      font-family: 'Fredoka One', sans-serif;
      font-size: 1.7rem;
      background: linear-gradient(135deg, #ff6b9d, #ffd93d, #6bcb77);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }

    .score-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 4px 14px;
    }
    .score-label { font-size: 0.6rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }
    .score-value { font-family: 'Fredoka One', sans-serif; font-size: 1.3rem; color: var(--accent2); }

    /* Next fruit preview */
    .next-row {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .next-label { font-size: 0.65rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; }
    #next-preview {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.3));
    }

    /* Drop line indicator */
    #drop-line {
      position: absolute;
      top: 0;
      width: 2px;
      background: rgba(255,255,255,0.3);
      border-radius: 1px;
      pointer-events: none;
      transition: left 0.05s;
      display: none;
    }

    /* Game canvas wrapper */
    #canvas-wrap {
      position: relative;
      width: 100%;
      flex: 1;
      display: flex;
      align-items: flex-start;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 18px;
      border: 2px solid rgba(255,255,255,0.08);
      background: var(--panel);
      box-shadow: 0 0 40px rgba(108,60,200,0.3), inset 0 0 60px rgba(0,0,0,0.3);
      cursor: crosshair;
      touch-action: none;
    }

    /* Evolution bar */
    #evo-bar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      margin-top: 6px;
      padding: 6px 10px;
      background: var(--panel);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .evo-fruit {
      font-size: 1.1rem;
      opacity: 0.4;
      transition: all 0.3s;
      filter: grayscale(0.8);
    }
    .evo-arrow { font-size: 0.55rem; opacity: 0.25; }
    .evo-fruit.unlocked { opacity: 1; filter: none; }

    /* Overlay screens */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(13,8,32,0.9);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      gap: 18px;
    }
    .overlay.hidden { display: none; }

    .overlay h2 {
      font-family: 'Fredoka One', sans-serif;
      font-size: 2.5rem;
      background: linear-gradient(135deg, #ff6b9d, #ffd93d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .overlay-score {
      font-size: 1.2rem;
      opacity: 0.8;
    }
    .overlay-score span {
      font-family: 'Fredoka One', sans-serif;
      color: var(--accent2);
      font-size: 2rem;
    }

    .btn {
      font-family: 'Fredoka One', sans-serif;
      font-size: 1.2rem;
      padding: 14px 40px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      letter-spacing: 1px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn:active { transform: scale(0.96); }

    .btn-primary {
      background: linear-gradient(135deg, #ff6b9d, #ff8b6a);
      color: white;
      box-shadow: 0 6px 24px rgba(255,107,157,0.5);
    }
    .btn-primary:hover { box-shadow: 0 8px 32px rgba(255,107,157,0.7); transform: translateY(-2px); }

    .best-label {
      font-size: 0.75rem;
      opacity: 0.5;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Toast for merges */
    #toast {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: linear-gradient(135deg, #ff6b9d, #ffd93d);
      color: #0d0820;
      font-family: 'Fredoka One', sans-serif;
      font-size: 1.1rem;
      padding: 8px 20px;
      border-radius: 50px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s;
      z-index: 200;
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* PWA install banner */
    #install-banner {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 300;
      font-size: 0.8rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      max-width: 340px;
    }
    #install-banner.hidden { display: none; }
    #install-banner button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 5px 12px;
      font-family: 'Fredoka One', sans-serif;
      cursor: pointer;
      font-size: 0.85rem;
      white-space: nowrap;
    }
    #install-banner .dismiss {
      background: transparent;
      color: rgba(255,255,255,0.4);
      padding: 5px;
      font-size: 1rem;
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <h1>🍉 Fruit Merge</h1>
    <div style="display:flex;gap:8px">
      <div class="score-box">
        <span class="score-label">Score</span>
        <span class="score-value" id="score-display">0</span>
      </div>
      <div class="score-box">
        <span class="score-label">Best</span>
        <span class="score-value" id="best-display">0</span>
      </div>
    </div>
  </header>

  <div class="next-row">
    <span class="next-label">Next</span>
    <div id="next-preview">🍒</div>
    <span style="font-size:0.65rem;opacity:0.4;margin-left:auto">Drop to merge!</span>
  </div>

  <div id="canvas-wrap">
    <canvas id="gameCanvas"></canvas>
  </div>

  <div id="evo-bar">
    <span class="evo-fruit unlocked" id="evo-0">🍒</span>
    <span class="evo-arrow">▶</span>
    <span class="evo-fruit unlocked" id="evo-1">🍓</span>
    <span class="evo-arrow">▶</span>
    <span class="evo-fruit" id="evo-2">🍇</span>
    <span class="evo-arrow">▶</span>
    <span class="evo-fruit" id="evo-3">🍊</span>
    <span class="evo-arrow">▶</span>
    <span class="evo-fruit" id="evo-4">🍎</span>
    <span class="evo-arrow">▶</span>
    <span class="evo-fruit" id="evo-5">🍐</span>
    <span class="evo-arrow">▶</span>
    <span class="evo-fruit" id="evo-6">🍑</span>
    <span class="evo-arrow">▶</span>
    <span class="evo-fruit" id="evo-7">🍋</span>
    <span class="evo-arrow">▶</span>
    <span class="evo-fruit" id="evo-8">🍍</span>
    <span class="evo-arrow">▶</span>
    <span class="evo-fruit" id="evo-9">🥭</span>
    <span class="evo-arrow">▶</span>
    <span class="evo-fruit" id="evo-10">🍉</span>
  </div>
</div>

<!-- Overlays -->
<div class="overlay" id="start-screen">
  <div style="font-size:4rem">🍉</div>
  <h2>Fruit Merge</h2>
  <p style="opacity:0.6;text-align:center;max-width:280px;font-size:0.9rem">
    Drop fruits to merge matching ones into bigger fruits.<br>Reach the 🍉 watermelon!
  </p>
  <button class="btn btn-primary" id="start-btn">Play Now</button>
</div>

<div class="overlay hidden" id="gameover-screen">
  <div style="font-size:3rem">💥</div>
  <h2>Game Over!</h2>
  <div class="overlay-score">Score: <span id="final-score">0</span></div>
  <div class="best-label" id="new-best-label" style="display:none">🏆 New Best!</div>
  <button class="btn btn-primary" id="restart-btn">Play Again</button>
</div>

<div id="toast"></div>

<div id="install-banner" class="hidden">
  <span>📲</span>
  <span>Install for offline play!</span>
  <button id="install-btn">Install</button>
  <button class="dismiss" id="dismiss-banner">✕</button>
</div>

<script src="game.js"></script>
<script>
  // PWA install prompt
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('install-banner').classList.remove('hidden');
  });
  document.getElementById('install-btn').addEventListener('click', async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      document.getElementById('install-banner').classList.add('hidden');
    }
  });
  document.getElementById('dismiss-banner').addEventListener('click', () => {
    document.getElementById('install-banner').classList.add('hidden');
  });
</script>
</body>
</html>
